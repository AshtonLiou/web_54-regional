<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快樂旅遊網</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/website-management.css">
    <script src="./js/main.js"></script>
    <script src="./js/website-management.js"></script>
</head>

<body>

    <div id="cursor"></div>

    <!-- header -->

    <header>
        <a href="./index.html">
            <h1>快樂<span style="color: mediumaquamarine;">旅遊網</span></h1>
        </a>
        <input type="checkbox" id="hamburger-menu" style="display: none;">
        <label for="hamburger-menu" class="hamburger-menu">|||</label>
        <nav>
            <a href="./index.html">首頁</a>
            <a href="./visitor-message.html">訪客留言</a>
            <a href="./visitor-booking.html">訪客訂房</a>
            <a href="./visitor-order.html">訪客訂餐</a>
            <a href="./website-management.html" class="current-page">網站管理</a>
            <button id="logout-button" class="post-login hidden" onclick="logout()">登出</button>
        </nav>
        <div class="hamburger-menu-navbar">
            <a href="./index.html">首頁</a>
            <a href="./visitor-message.html">訪客留言</a>
            <a href="./visitor-booking.html">訪客訂房</a>
            <a href="./visitor-order.html">訪客訂餐</a>
            <a href="./website-management.html" class="current-page">網站管理</a>
            <button id="logout-button" class="post-login hidden" onclick="logout()">登出</button>
        </div>
    </header>

    <main>

        <!-- login form -->

        <form id="login-form" class="pre-login" name="login-form" onsubmit="loginFormSubmit(event)">

            <h1 style="text-align: center;">網站管理-登入</h1>

            <div class="form-float">
                <input type="text" id="login-form-account" name="account" placeholder=" " required>
                <label for="login-form-account">帳號</label>
            </div>

            <div class="form-float">
                <input type="password" id="login-form-password" name="password" placeholder=" " required>
                <label for="login-form-password">密碼</label>
            </div>

            <div id="captcha-container">
                <div class="form-float">
                    <input type="text" id="login-form-verification" name="verification" placeholder=" " required>
                    <label for="login-form-verification">圖片驗證碼</label>
                </div>
                <img src="./img/captcha-image.png" alt="captcha image" id="captcha-image">
                <button type="button" class="button-gray" onclick="reGenerate()">驗證碼重新產生</button>
            </div>

            <button type="reset" class="button-gray">重設</button>
            <button type="submit" class="button-green">送出</button>

        </form>

        <!-- management section -->

        <section id="management-section" class="post-login hidden">

            <!-- message management section -->

            <section class="visitor-message-list-section">

                <nav>
                    <button class="button-gray button-disabled"
                        onclick="toggleDisplay('.booking-management-section', '.visitor-message-list-section')">留言列表</button>
                    <button class="button-gray"
                        onclick="toggleDisplay('.visitor-message-list-section', '.booking-management-section')">訂房管理</button>
                </nav>

                <!-- visitor message list container -->

                <div id="visitor-message-list-container" class="visitor-message-list-container"></div>

            </section>

            <!-- visitor message edit section -->

            <section class="visitor-message-edit-section hidden">

                <nav>
                    <h1>訪客留言-編輯</h1>
                    <button class="button-gray"
                        onclick="toggleDisplay('.visitor-message-edit-section', '.visitor-message-list-section')">回留言列表</button>
                </nav>

                <form id="edit-message-form" name="edit-message-form">

                    <div class="form-float">
                        <input type="text" id="edit-name" name="name" placeholder=" " required>
                        <label for="edit-name">姓名</label>
                    </div>

                    <div>
                        <div class="form-float" style="display: inline-block; width: calc(100% - 4em);">
                            <input type="email" name="email" id="edit-email" placeholder=" " required
                                oninput="this.setCustomValidity('')">
                            <label for="edit-email">E-mail</label>
                        </div>
                        <input type="checkbox" id="edit-show-email" name="showEmail"
                            style="margin-left: .5rem; transform: scale(1.3); cursor: pointer;">
                        <label for="edit-show-email" style="user-select: none; cursor: pointer;">顯示</label>
                    </div>

                    <div>
                        <div class="form-float" style="display: inline-block; width: calc(100% - 4em);">
                            <input type="tel" name="telephone" id="edit-telephone" placeholder=" " required
                                oninput="this.setCustomValidity('')">
                            <label for="edit-telephone">電話</label>
                        </div>
                        <input type="checkbox" id="edit-show-telephone" name="showTelephone"
                            style="margin-left: .5rem; transform: scale(1.3); cursor: pointer;">
                        <label for="edit-show-telephone" style="user-select: none; cursor: pointer;">顯示</label>
                    </div>

                    <div class="form-float">
                        <textarea id="edit-content" name="content" placeholder=" " required></textarea>
                        <label for="edit-content">內容</label>
                    </div>

                    <button type="reset" name="editMessageFormReset" class="button-gray">重設</button>
                    <button type="submit" class="button-green">送出</button>

                </form>

            </section>

            <!-- booking management section -->

            <section class="booking-management-section hidden">

                <nav>
                    <button class="button-gray"
                        onclick="toggleDisplay('.booking-management-section', '.visitor-message-list-section')">留言列表</button>
                    <button class="button-gray button-disabled"
                        onclick="toggleDisplay('.visitor-message-list-section', '.booking-management-section')">訂房管理</button>
                </nav>

            </section>

        </section>

    </main>

</body>

</html>
